<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuestra Salud | Gu&#237;a de salud para la comunidad latina</title>
    <meta name="description" content="Gu&#237;a de salud para la comunidad latina. Conoce las condiciones que nos afectan, recursos, y tratamientos en investigaci&#243;n.">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#x1F49A;</text></svg>">
    <style>
        :root{--bg:#FAFAFA;--bg2:#F2F2F7;--card:#FFF;--text:#1D1D1F;--text2:#86868B;--accent:#0071E3;--green:#34C759;--orange:#FF9500;--purple:#AF52DE;--red:#FF3B30;--border:#E5E5EA;--sh:0 1px 3px rgba(0,0,0,.08);--sh-lg:0 10px 30px rgba(0,0,0,.1);--r:14px;--sk:#E5E5EA;--sk2:#F2F2F7}
        .dark{--bg:#0A0A0A;--bg2:#1C1C1E;--card:#1C1C1E;--text:#F5F5F7;--text2:#A1A1A6;--border:#38383A;--sh:0 1px 3px rgba(0,0,0,.3);--sh-lg:0 10px 30px rgba(0,0,0,.4);--sk:#2C2C2E;--sk2:#3A3A3C}
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Inter','Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);line-height:1.5;-webkit-font-smoothing:antialiased;transition:background .3s,color .3s}
        .container{max-width:1120px;margin:0 auto;padding:0 24px}
        a{color:var(--accent);text-decoration:none}a:hover{text-decoration:underline}
        .site-header{padding:14px 0;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);background:color-mix(in srgb,var(--bg) 85%,transparent)}
        .header-inner{display:flex;align-items:center;justify-content:space-between;gap:12px}
        .header-brand h1{font-size:1.2rem;font-weight:700;letter-spacing:-.02em}
        .header-brand p{font-size:.72rem;color:var(--text2);margin-top:1px}
        .header-brand .trust{font-size:.65rem;color:var(--text2);opacity:.7;margin-top:2px}
        .header-controls{display:flex;align-items:center;gap:8px}
        .toggle-pill{display:flex;background:var(--bg2);border-radius:20px;padding:3px;border:1px solid var(--border)}
        .toggle-pill button{padding:4px 12px;border:none;background:none;border-radius:17px;font-size:.78rem;font-weight:600;color:var(--text2);cursor:pointer;transition:all .2s;font-family:inherit}
        .toggle-pill button.active{background:var(--card);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.1)}
        .theme-toggle{width:34px;height:34px;border-radius:50%;border:1px solid var(--border);background:var(--bg2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.95rem;transition:all .2s}
        .theme-toggle:hover{background:var(--border)}
        .data-source{font-size:.65rem;color:var(--text2);display:none}
        @media(min-width:768px){.data-source{display:block}}
        .tab-bar{position:sticky;top:51px;z-index:99;background:color-mix(in srgb,var(--bg) 90%,transparent);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:10px 0}
        .tab-pills{display:flex;gap:4px;overflow-x:auto;-webkit-overflow-scrolling:touch}.tab-pills::-webkit-scrollbar{display:none}
        .tab-pill{padding:7px 16px;border-radius:20px;border:1px solid var(--border);background:var(--bg);color:var(--text2);font-size:.8rem;font-weight:600;cursor:pointer;transition:all .2s;font-family:inherit;white-space:nowrap}
        .tab-pill:hover{border-color:var(--accent);color:var(--accent)}
        .tab-pill.active{background:var(--accent);color:#fff;border-color:var(--accent)}
        .tab-content{display:none}.tab-content.active{display:block}
        .hero{padding:36px 0 28px;text-align:center}
        .hero-text{max-width:620px;margin:0 auto 24px}
        .hero-text h2{font-size:1.8rem;font-weight:700;letter-spacing:-.03em;line-height:1.2;margin-bottom:10px}
        .hero-text p{font-size:.95rem;color:var(--text2);line-height:1.6}
        .search-wrapper{max-width:540px;margin:0 auto;position:relative}
        .search-icon{position:absolute;left:16px;top:50%;transform:translateY(-50%);font-size:1rem;color:var(--text2);pointer-events:none}
        .search-input{width:100%;padding:12px 20px 12px 44px;border:1px solid var(--border);border-radius:12px;font-size:1rem;font-family:inherit;background:var(--card);color:var(--text);outline:none;transition:all .2s;box-shadow:var(--sh)}
        .search-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,113,227,.15)}
        .search-input::placeholder{color:var(--text2)}
        .section-title{font-size:.76rem;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text2);margin-bottom:14px}
        .conditions-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:40px}
        @media(min-width:640px){.conditions-grid{grid-template-columns:repeat(3,1fr)}}
        @media(min-width:900px){.conditions-grid{grid-template-columns:repeat(5,1fr)}}
        .condition-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:18px;cursor:pointer;transition:all .2s;overflow:hidden;border-top:3px solid var(--accent)}
        .condition-card:hover{box-shadow:var(--sh-lg);transform:translateY(-2px);border-color:var(--accent)}
        .condition-card:nth-child(even){border-top-color:var(--green)}
        .condition-card:nth-child(3n){border-top-color:var(--purple)}
        .cond-icon{font-size:1.5rem;margin-bottom:8px;display:block}
        .cond-name{font-size:.88rem;font-weight:700;margin-bottom:2px;line-height:1.3}
        .cond-sub{font-size:.68rem;color:var(--text2);margin-bottom:6px}
        .cond-stat{font-size:.68rem;color:var(--text2);line-height:1.4;margin-bottom:10px}
        .cond-cta{display:inline-flex;align-items:center;gap:3px;padding:5px 12px;background:color-mix(in srgb,var(--accent) 10%,transparent);color:var(--accent);border-radius:8px;font-size:.72rem;font-weight:600}
        @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
        .skel{height:14px;border-radius:7px;margin-bottom:10px;animation:shimmer 1.8s infinite;background-image:linear-gradient(90deg,var(--sk) 0%,var(--sk2) 50%,var(--sk) 100%);background-size:200% 100%}
        .skel.w100{width:100%}.skel.w80{width:80%}.skel.w60{width:60%}.skel.w40{width:40%}
        .back-btn{display:inline-flex;align-items:center;gap:4px;padding:8px 16px;margin-bottom:24px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:.85rem;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s}
        .back-btn:hover{border-color:var(--accent);color:var(--accent)}
        .detail-header{display:flex;align-items:center;gap:14px;margin-bottom:28px}
        .detail-header .icon{font-size:2.4rem}
        .detail-header h2{font-size:1.6rem;font-weight:700;letter-spacing:-.02em}
        .detail-header .sub{font-size:.85rem;color:var(--text2)}
        .detail-section{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:28px;margin-bottom:16px;transition:all .2s}
        .detail-section:hover{box-shadow:var(--sh)}
        .detail-section h3{font-size:1rem;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px;color:var(--accent)}
        .detail-body{font-size:.88rem;color:var(--text2);line-height:1.7}
        .detail-body p{margin-bottom:10px}
        .detail-body ul{padding-left:20px;margin-bottom:10px}
        .detail-body li{margin-bottom:8px;line-height:1.5}
        .detail-body a{font-weight:600}
        .bar-chart{margin:12px 0}
        .bar-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
        .bar-label{font-size:.72rem;font-weight:600;min-width:90px;text-align:right;color:var(--text2)}
        .bar-track{flex:1;height:24px;background:var(--bg2);border-radius:6px;overflow:hidden}
        .bar-fill{height:100%;border-radius:6px;display:flex;align-items:center;padding:0 8px;font-size:.7rem;font-weight:700;color:#fff;transition:width .6s}
        .bar-fill.accent{background:var(--accent)}.bar-fill.gray{background:var(--text2);opacity:.5}
        .disp-source{font-size:.68rem;color:var(--text2)}
        .trial-intro{font-size:.85rem;color:var(--text2);margin-bottom:16px;padding:14px;background:var(--bg2);border-radius:10px;line-height:1.6}
        .geo-row{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
        .geo-btn{padding:8px 16px;border-radius:20px;border:1px solid var(--accent);background:transparent;color:var(--accent);font-size:.82rem;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s}
        .geo-btn:hover,.geo-btn.active{background:var(--accent);color:#fff}
        .geo-msg{font-size:.78rem;color:var(--text2)}
        .results-section{padding-bottom:48px}
        .results-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px}
        .results-title{font-size:1.1rem;font-weight:700}
        .results-count{font-size:.82rem;color:var(--text2)}
        .filter-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;align-items:center}
        .filter-group{display:flex;gap:4px;flex-wrap:wrap;align-items:center}
        .filter-label{font-size:.7rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--text2);margin-right:4px}
        .filter-pill{padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:var(--bg);color:var(--text2);font-size:.75rem;font-weight:500;cursor:pointer;transition:all .2s;font-family:inherit;white-space:nowrap}
        .filter-pill:hover{border-color:var(--accent);color:var(--accent)}
        .filter-pill.active{background:var(--accent);color:#fff;border-color:var(--accent)}
        .country-select{padding:5px 10px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:.78rem;font-family:inherit;cursor:pointer;outline:none}
        .trial-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:22px;margin-bottom:12px;transition:all .2s}
        .trial-card:hover{box-shadow:var(--sh)}
        .trial-badges{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px}
        .badge{padding:3px 9px;border-radius:20px;font-size:.68rem;font-weight:600}
        .badge-recruiting{background:color-mix(in srgb,var(--green) 12%,transparent);color:var(--green)}
        .badge-not-yet{background:color-mix(in srgb,var(--orange) 12%,transparent);color:var(--orange)}
        .badge-invitation{background:color-mix(in srgb,var(--purple) 12%,transparent);color:var(--purple)}
        .badge-phase{background:color-mix(in srgb,var(--accent) 10%,transparent);color:var(--accent)}
        .badge-distance{background:color-mix(in srgb,var(--green) 10%,transparent);color:var(--green)}
        .trial-title{font-size:.95rem;font-weight:600;line-height:1.4;margin-bottom:6px}
        .trial-meta{font-size:.78rem;color:var(--text2);margin-bottom:4px;display:flex;flex-wrap:wrap;gap:12px}
        .trial-meta span{display:inline-flex;align-items:center;gap:3px}
        .trial-locations{font-size:.78rem;color:var(--text2);margin-bottom:8px}
        .trial-locations span{margin-right:8px}
        .trial-summary{font-size:.82rem;color:var(--text2);line-height:1.6;margin-bottom:12px}
        .trial-actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
        .trial-link{display:inline-flex;align-items:center;gap:3px;color:var(--accent);font-size:.82rem;font-weight:600}
        .trial-link:hover{opacity:.7;text-decoration:none}
        .action-btn{padding:5px 12px;border-radius:8px;border:1px solid var(--border);background:var(--bg2);color:var(--text2);font-size:.75rem;font-weight:500;cursor:pointer;font-family:inherit;transition:all .2s}
        .action-btn:hover{border-color:var(--accent);color:var(--accent)}
        .action-btn.copied{background:var(--green);color:#fff;border-color:var(--green)}
        .expand-section{max-height:0;overflow:hidden;transition:max-height .35s ease}
        .expand-section.open{max-height:800px}
        .expand-inner{margin-top:12px;padding:14px;background:var(--bg2);border-radius:10px;font-size:.8rem;line-height:1.6}
        .expand-toggle{font-size:.78rem;font-weight:600;color:var(--accent);cursor:pointer;border:none;background:none;padding:0;font-family:inherit}
        .expand-toggle:hover{text-decoration:underline}
        .eligibility-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
        .elig-item{font-size:.78rem}
        .elig-label{font-weight:600;color:var(--text);display:block;font-size:.72rem;text-transform:uppercase;letter-spacing:.03em;margin-bottom:2px}
        .elig-value{color:var(--text2)}
        .criteria-list{padding-left:16px;margin-top:6px}
        .criteria-list li{font-size:.78rem;color:var(--text2);margin-bottom:4px}
        .fda-reactions{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0}
        .fda-pill{padding:3px 10px;border-radius:12px;background:color-mix(in srgb,var(--orange) 10%,transparent);color:var(--orange);font-size:.72rem;font-weight:500}
        .fda-disclaimer{font-size:.68rem;color:var(--text2);font-style:italic;margin-top:6px}
        .trial-skeleton{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:22px;margin-bottom:12px}
        .skel-line{height:14px;border-radius:7px;margin-bottom:10px;animation:shimmer 1.8s infinite;background-image:linear-gradient(90deg,var(--sk) 0%,var(--sk2) 50%,var(--sk) 100%);background-size:200% 100%}
        .skel-line.w100{width:100%}.skel-line.w80{width:80%}.skel-line.w60{width:60%}.skel-line.w40{width:40%}.skel-line.w30{width:30%;height:10px}.skel-line.h20{height:22px;margin-bottom:14px}
        .load-more{display:block;width:100%;max-width:280px;margin:20px auto 0;padding:12px 24px;background:var(--accent);color:#fff;border:none;border-radius:12px;font-size:.92rem;font-weight:600;font-family:inherit;cursor:pointer;transition:all .2s}
        .load-more:hover{opacity:.85}.load-more:disabled{opacity:.5;cursor:not-allowed}
        .no-results{text-align:center;padding:40px 20px;color:var(--text2)}
        .no-results .nr-icon{font-size:2.2rem;margin-bottom:10px}
        .error-msg{text-align:center;padding:28px 20px;background:color-mix(in srgb,var(--red) 8%,transparent);border-radius:var(--r);color:var(--red);font-weight:500;margin-bottom:16px}
        .disp-header{text-align:center;padding:36px 0 28px}
        .disp-header h2{font-size:1.5rem;font-weight:700;margin-bottom:8px}
        .disp-header p{font-size:.92rem;color:var(--text2);max-width:560px;margin:0 auto}
        .disp-grid{display:grid;grid-template-columns:1fr;gap:14px;padding-bottom:48px}
        @media(min-width:768px){.disp-grid{grid-template-columns:repeat(2,1fr)}}
        .disp-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:22px;transition:all .2s;cursor:pointer}
        .disp-card:hover{box-shadow:var(--sh);border-color:var(--accent)}
        .disp-card-header{display:flex;align-items:center;gap:10px;margin-bottom:12px}
        .disp-card-header .icon{font-size:1.3rem}
        .disp-card-header h3{font-size:.95rem;font-weight:700}
        .disp-desc{font-size:.82rem;color:var(--text2);margin-bottom:14px;line-height:1.5}
        .disp-action{display:inline-block;margin-top:10px;padding:5px 14px;border-radius:8px;background:color-mix(in srgb,var(--accent) 10%,transparent);color:var(--accent);font-size:.78rem;font-weight:600;cursor:pointer;border:none;font-family:inherit;transition:all .2s}
        .disp-action:hover{background:var(--accent);color:#fff;text-decoration:none}
        .res-header{text-align:center;padding:36px 0 28px}
        .res-header h2{font-size:1.5rem;font-weight:700;margin-bottom:8px}
        .res-header p{font-size:.92rem;color:var(--text2);max-width:560px;margin:0 auto}
        .res-category{margin-bottom:28px}
        .res-category h3{font-size:.9rem;font-weight:700;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)}
        .res-grid{display:grid;grid-template-columns:1fr;gap:10px}
        @media(min-width:640px){.res-grid{grid-template-columns:repeat(2,1fr)}}
        .res-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;transition:all .2s}
        .res-card:hover{box-shadow:var(--sh);border-color:var(--accent)}
        .res-card h4{font-size:.85rem;font-weight:600;margin-bottom:4px}
        .res-card p{font-size:.78rem;color:var(--text2);margin-bottom:6px}
        .res-badge-es{display:inline-block;padding:2px 8px;border-radius:10px;background:color-mix(in srgb,var(--green) 12%,transparent);color:var(--green);font-size:.68rem;font-weight:600;margin-left:6px}
        .site-footer{border-top:1px solid var(--border);padding:28px 0;text-align:center;font-size:.78rem;color:var(--text2);line-height:1.8}
        .footer-disclaimer{max-width:500px;margin:10px auto 0;font-size:.7rem;opacity:.8}
        @media(max-width:480px){
            .hero-text h2{font-size:1.35rem}.hero{padding:24px 0 20px}
            .header-brand p,.header-brand .trust{display:none}
            .condition-card{padding:14px}.trial-card{padding:16px}
            .detail-section{padding:18px}.eligibility-grid{grid-template-columns:1fr}
            .detail-header .icon{font-size:1.8rem}.detail-header h2{font-size:1.2rem}
        }
        html{scroll-behavior:smooth}
        :focus-visible{outline:2px solid var(--accent);outline-offset:2px}
        @media print{.site-header,.tab-bar,.site-footer{display:none}.trial-card{break-inside:avoid}}
    </style>
</head>
<body>
    <header class="site-header">
        <div class="container header-inner">
            <div class="header-brand">
                <h1 id="site-title">Nuestra Salud</h1>
                <p id="site-subtitle"></p>
                <div class="trust" id="trust-tag"></div>
            </div>
            <div class="header-controls">
                <span class="data-source" id="data-source"></span>
                <div class="toggle-pill" id="lang-toggle">
                    <button class="active" data-lang="es">ES</button>
                    <button data-lang="en">EN</button>
                </div>
                <button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark mode">&#9789;</button>
            </div>
        </div>
    </header>
    <nav class="tab-bar"><div class="container"><div class="tab-pills" id="tab-pills"></div></div></nav>
    <main>
        <div id="tab-conditions" class="tab-content active">
            <div id="cond-grid-view">
                <section class="hero"><div class="container">
                    <div class="hero-text"><h2 id="hero-title"></h2><p id="hero-desc"></p></div>
                    <div class="search-wrapper"><span class="search-icon">&#128269;</span><input type="text" class="search-input" id="cond-search" autocomplete="off"></div>
                </div></section>
                <section class="container">
                    <p class="section-title" id="conditions-label"></p>
                    <div class="conditions-grid" id="conditions-grid"></div>
                </section>
            </div>
            <div id="cond-detail-view" style="display:none"><div class="container" style="padding-top:24px;padding-bottom:48px" id="cond-detail"></div></div>
        </div>
        <div id="tab-disparities" class="tab-content"><div class="container">
            <div class="disp-header"><h2 id="disp-title"></h2><p id="disp-desc"></p></div>
            <div class="disp-grid" id="disp-grid"></div>
        </div></div>
        <div id="tab-resources" class="tab-content"><div class="container">
            <div class="res-header"><h2 id="res-title"></h2><p id="res-desc"></p></div>
            <div id="res-content"></div>
        </div></div>
        <div id="tab-trials" class="tab-content">
            <section class="hero"><div class="container">
                <div class="hero-text"><h2 id="trials-hero-title"></h2><p id="trials-hero-desc"></p></div>
                <div class="search-wrapper"><span class="search-icon">&#128269;</span><input type="text" class="search-input" id="trial-search" autocomplete="off"></div>
            </div></section>
            <section class="container results-section" id="results-section" style="display:none">
                <div class="results-header"><h3 class="results-title" id="results-title"></h3><span class="results-count" id="results-count"></span></div>
                <div class="geo-row" id="geo-row" style="display:none"></div>
                <div class="filter-row" id="filter-row"></div>
                <div id="results-list"></div>
                <div id="error-container"></div>
                <button class="load-more" id="load-more" style="display:none"></button>
            </section>
        </div>
    </main>
    <footer class="site-footer"><div class="container">
        <p id="footer-created"></p>
        <p id="footer-source"></p>
        <p class="footer-disclaimer" id="footer-disclaimer"></p>
    </div></footer>
<script>
(function(){
'use strict';
const T={es:{
siteTitle:'Nuestra Salud',siteSubtitle:'Gu\u00eda de salud para la comunidad latina',
trustTag:'Informaci\u00f3n confiable. Sin cuentas. Sin rastreo. Para ti.',
heroTitle:'Conoce las condiciones que afectan a tu comunidad',
heroDesc:'La comunidad latina enfrenta tasas m\u00e1s altas de ciertas condiciones de salud. Conocerlas es el primer paso para protegerte a ti y a tu familia.',
searchCond:'Buscar condici\u00f3n de salud...',
conditionsLabel:'10 condiciones prioritarias para la comunidad latina',
knowMore:'Conoce m\u00e1s \u2192',

let ulat=null,ulng=null,geoReq=false,fdaC=new Map(),mlC=new Map(),studies=[];
const $=s=>document.querySelector(s),$$=s=>document.querySelectorAll(s),t=k=>T[lang][k]||k;
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}

function readURL(){const p=new URLSearchParams(location.search);if(p.get('tab'))tab=p.get('tab');if(p.get('cond')){const i=C.findIndex(c=>c.id===p.get('cond'));if(i>=0){viewCond=i;tab='conditions'}}if(p.get('q'))sq=p.get('q');if(p.get('phase'))filters.phase=p.get('phase');if(p.get('status'))filters.status=p.get('status');if(p.get('country'))filters.country=p.get('country');if(p.get('lang')==='en')lang='en'}
function setURL(){const p=new URLSearchParams();if(tab!=='conditions')p.set('tab',tab);if(viewCond!==null)p.set('cond',C[viewCond].id);if(sq)p.set('q',sq);if(filters.phase)p.set('phase',filters.phase);if(filters.status)p.set('status',filters.status);if(filters.country)p.set('country',filters.country);if(lang!=='es')p.set('lang',lang);const s=p.toString();history.replaceState(null,'',s?'?'+s:location.pathname)}

async function api(params){const u=new URL(API);Object.entries(params).forEach(([k,v])=>{if(v!=null&&v!=='')u.searchParams.set(k,v)});const r=await fetch(u);if(!r.ok)throw new Error(r.status);return r.json()}
async function countTrials(c){try{const d=await api({'query.cond':c.q,'filter.overallStatus':'RECRUITING,NOT_YET_RECRUITING,ENROLLING_BY_INVITATION','countTotal':'true','pageSize':'0'});return d.totalCount||0}catch(e){return -1}}
async function searchTrials(q,pt){const p={'countTotal':'true','pageSize':'10'};if(q)p['query.cond']=q;if(pt)p['pageToken']=pt;p['filter.overallStatus']=filters.status||'RECRUITING,NOT_YET_RECRUITING,ENROLLING_BY_INVITATION';if(filters.phase)p['filter.phase']=filters.phase;if(filters.country)p['query.locn']=filters.country;return api(p)}
async function fetchFDA(drug){if(!drug)return null;const k=drug.toLowerCase();if(fdaC.has(k))return fdaC.get(k);try{const r=await fetch(FDA+'?search=patient.drug.openfda.generic_name:"'+encodeURIComponent(drug)+'"&count=patient.reaction.reactionmeddrapt.exact&limit=5');if(!r.ok){fdaC.set(k,null);return null}const d=await r.json();fdaC.set(k,d.results||[]);return d.results||[]}catch(e){fdaC.set(k,null);return null}}
async function fetchML(icd){const ck=icd+'_'+lang;if(mlC.has(ck))return mlC.get(ck);try{const r=await fetch('https://connect.medlineplus.gov/service?mainSearchCriteria.v.cs=2.16.840.1.113883.6.90&mainSearchCriteria.v.c='+encodeURIComponent(icd)+'&knowledgeResponseType=application/json&informationRecipient.languageCode.c='+(lang==='es'?'es':'en'));if(!r.ok){mlC.set(ck,null);return null}const d=await r.json();const e=d.feed&&d.feed.entry&&d.feed.entry[0];if(!e){mlC.set(ck,null);return null}const res={title:e.title&&e.title._value||'',summary:e.summary&&e.summary._value||'',url:e.link&&e.link[0]&&e.link[0].href||''};mlC.set(ck,res);return res}catch(e){mlC.set(ck,null);return null}}

function haversine(a,b,c,d){const R=3959,dL=(c-a)*Math.PI/180,dN=(d-b)*Math.PI/180,x=Math.sin(dL/2)**2+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dN/2)**2;return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x))}
function cityCoords(city){if(!city)return null;const c=city.trim();if(COORDS[c])return COORDS[c];for(const[k,v]of Object.entries(COORDS)){if(c.toLowerCase().includes(k.toLowerCase()))return v}return null}
function trialDist(s){if(!ulat)return null;const locs=s.protocolSection?.contactsLocationsModule?.locations||[];let m=Infinity;for(const l of locs){const co=cityCoords(l.city);if(co){const d=haversine(ulat,ulng,co[0],co[1]);if(d<m)m=d}}return m===Infinity?null:Math.round(m)}
function reqGeo(){if(!navigator.geolocation){geoMsg(t('geoDenied'));return}navigator.geolocation.getCurrentPosition(p=>{ulat=p.coords.latitude;ulng=p.coords.longitude;geoReq=true;geoMsg(t('geoGranted'));reloadTrials()},()=>geoMsg(t('geoDenied')))}
function geoMsg(m){const r=$('#geo-row');if(!r)return;r.style.display='flex';r.innerHTML='<button class="geo-btn'+(ulat?' active':'')+'" onclick="window._ns.reqGeo()">'+t('findNearMe')+'</button><span class="geo-msg">'+m+'</span>'}

let detailNPT=null;
async function loadDetailTrials(q){
const el=$('#detail-trials'),btn=$('#detail-load-more');
el.innerHTML='<div class="trial-skeleton"><div class="skel-line w30"></div><div class="skel-line h20 w80"></div><div class="skel-line w60"></div></div>'.repeat(2);
try{const data=await searchTrials(q,null);detailNPT=data.nextPageToken||null;const s=data.studies||[];studies=s;
const show=s.slice(0,3),rest=s.slice(3);
el.innerHTML=show.length?show.map(renderTrialCard).join(''):'<div class="no-results"><div class="nr-icon">\uD83D\uDD0D</div><p>'+t('noResults')+'</p></div>';
if(rest.length){el.insertAdjacentHTML('beforeend','<div id="detail-hidden" style="display:none">'+rest.map(renderTrialCard).join('')+'</div>')}
btn.style.display=(detailNPT||rest.length)?'block':'none';
s.forEach(st=>{const nct=st.protocolSection?.identificationModule?.nctId;const drug=st.protocolSection?.armsInterventionsModule?.interventions?.find(iv=>iv.type==='DRUG'||iv.type==='BIOLOGICAL');if(drug&&nct)loadFDA(nct,drug.name)})}
catch(e){el.innerHTML='<div class="error-msg">'+t('errorMsg')+'</div>'}}

async function loadDetailMore(){
if(!viewCond)return;const btn=$('#detail-load-more');
const hidden=$('#detail-hidden');
if(hidden&&hidden.style.display==='none'){hidden.style.display='block';if(!detailNPT)btn.style.display='none';return}
if(!detailNPT)return;btn.disabled=true;btn.textContent='...';
try{const data=await searchTrials(C[viewCond].q,detailNPT);detailNPT=data.nextPageToken||null;const s=data.studies||[];studies=studies.concat(s);
$('#detail-trials').innerHTML+=s.map(renderTrialCard).join('');btn.style.display=detailNPT?'block':'none';btn.disabled=false;btn.textContent=t('loadMore');
s.forEach(st=>{const nct=st.protocolSection?.identificationModule?.nctId;const drug=st.protocolSection?.armsInterventionsModule?.interventions?.find(iv=>iv.type==='DRUG'||iv.type==='BIOLOGICAL');if(drug&&nct)loadFDA(nct,drug.name)})}
catch(e){btn.disabled=false;btn.textContent=t('loadMore')}}

function statusBadge(s){const m={'RECRUITING':{c:'badge-recruiting',es:'Reclutando',en:'Recruiting'},'NOT_YET_RECRUITING':{c:'badge-not-yet',es:'Por iniciar',en:'Not yet recruiting'},'ENROLLING_BY_INVITATION':{c:'badge-invitation',es:'Por invitaci\u00f3n',en:'By invitation'}};const i=m[s]||{c:'',es:s,en:s};return'<span class="badge '+i.c+'">'+(lang==='es'?i.es:i.en)+'</span>'}
function phaseBadge(p){if(!p||!p.length)return'';const m={'EARLY_PHASE1':'Temprana','PHASE1':'Fase 1','PHASE2':'Fase 2','PHASE3':'Fase 3','PHASE4':'Fase 4','NA':'N/A'};return p.map(x=>'<span class="badge badge-phase">'+(lang==='es'?(m[x]||x):x.replace('PHASE','Phase ').replace('EARLY_','Early ').replace('NA','N/A'))+'</span>').join(' ')}

function renderTrialCard(study){
const ps=study.protocolSection||{},id=ps.identificationModule||{},st=ps.statusModule||{},ds=ps.designModule||{},desc=ps.descriptionModule||{},loc=ps.contactsLocationsModule||{},el=ps.eligibilityModule||{},arms=ps.armsInterventionsModule||{},sp=ps.sponsorCollaboratorsModule||{};
const nct=id.nctId||'',title=id.briefTitle||'Untitled',status=st.overallStatus||'',phases=ds.phases||[],summary=(desc.briefSummary||'').substring(0,200),locs=(loc.locations||[]).slice(0,3),ctURL='https://clinicaltrials.gov/study/'+nct,dist=trialDist(study);
const sponsor=sp.leadSponsor?.name||'',enroll=ds.enrollmentInfo?.count,stype=ds.studyType||'',sDate=st.startDateStruct?.date||'',eDate=st.completionDateStruct?.date||'';
const ivs=arms.interventions||[],drug=ivs.find(iv=>iv.type==='DRUG'||iv.type==='BIOLOGICAL'),dn=drug?drug.name:null;
let locH=locs.length?locs.map(l=>'<span>\uD83D\uDCCD '+[l.city,l.state,l.country].filter(Boolean).join(', ')+'</span>').join(''):'<span>'+t('noLocation')+'</span>';
const dB=dist!==null?' <span class="badge badge-distance">~'+dist+' '+t('miles')+'</span>':'';
let meta='';if(sponsor)meta+='<span>'+t('sponsor')+': '+esc(sponsor)+'</span>';if(enroll)meta+='<span>'+t('seeking')+' '+enroll.toLocaleString()+' '+t('participants')+'</span>';if(stype)meta+='<span>'+t('studyType')+': '+(stype==='INTERVENTIONAL'?t('interventional'):stype==='OBSERVATIONAL'?t('observational'):stype)+'</span>';
const minA=el.minimumAge||'',maxA=el.maximumAge||'',sex=el.sex||'ALL',hv=el.healthyVolunteers;
const sexL=sex==='ALL'?t('allSexes'):sex==='FEMALE'?t('female'):sex==='MALE'?t('male'):sex;
const hvL=hv===true?t('yes'):hv===false?t('no'):'---';
let crit='';if(el.eligibilityCriteria){const lines=[];let inc=false;for(const ln of el.eligibilityCriteria.split('\n')){if(/inclusion/i.test(ln)){inc=true;continue}if(/exclusion/i.test(ln)){inc=false;continue}if(inc&&ln.trim().length>10&&lines.length<4)lines.push(ln.trim().replace(/^[\*\-\d\.]+\s*/,''))}
if(lines.length)crit='<div style="margin-top:8px"><span class="elig-label">'+t('keyCriteria')+'</span><ul class="criteria-list">'+lines.map(l=>'<li>'+esc(l.substring(0,120))+'</li>').join('')+'</ul></div>'}
const eligH='<div class="expand-section" id="elig-'+nct+'"><div class="expand-inner"><div class="eligibility-grid"><div class="elig-item"><span class="elig-label">'+t('age')+'</span><span class="elig-value">'+(minA&&maxA?t('between')+' '+minA+' '+t('and')+' '+maxA:minA||maxA||'---')+'</span></div><div class="elig-item"><span class="elig-label">'+t('sex')+'</span><span class="elig-value">'+sexL+'</span></div><div class="elig-item"><span class="elig-label">'+t('healthyVol')+'</span><span class="elig-value">'+hvL+'</span></div></div>'+crit+'</div></div>';
let fdaH='';if(dn)fdaH='<div class="expand-section" id="fda-'+nct+'"><div class="expand-inner" id="fda-inner-'+nct+'"><div class="skel-line w60"></div><div class="skel-line w40"></div></div></div>';
return'<div class="trial-card" data-nctid="'+nct+'">'+'<div class="trial-badges">'+statusBadge(status)+' '+phaseBadge(phases)+dB+'</div>'+'<div class="trial-title">'+esc(title)+'</div>'+(meta?'<div class="trial-meta">'+meta+'</div>':'')+'<div class="trial-locations">'+locH+'</div>'+(summary?'<div class="trial-summary">'+esc(summary)+(summary.length>=200?'...':'')+'</div>':'')+'<div class="trial-actions">'+'<a class="trial-link" href="'+ctURL+'" target="_blank" rel="noopener">'+t('viewOnCT')+' \u2192</a>'+'<button class="action-btn" onclick="window._ns.copyLink(\''+ctURL+'\',this)">'+t('copyLink')+'</button>'+'<button class="action-btn" onclick="window._ns.shareTrial(\''+nct+'\')">'+t('share')+'</button>'+'<button class="expand-toggle" onclick="window._ns.togExp(\'elig-'+nct+'\')">\uD83D\uDC64 '+t('canIJoin')+'</button>'+(dn?'<button class="expand-toggle" onclick="window._ns.togFDA(\''+nct+"','"+esc(dn).replace(/'/g,"\\'")+"')\">\uD83D\uDC8A "+t('drugSafety')+'</button>':'')+'</div>'+eligH+fdaH+'</div>'}

async function loadTrialResults(q,append){
if(loading)return;loading=true;
const sec=$('#results-section'),list=$('#results-list'),err=$('#error-container'),btn=$('#load-more');
sec.style.display='block';err.innerHTML='';
if(!append){list.innerHTML='<div class="trial-skeleton"><div class="skel-line w30"></div><div class="skel-line h20 w80"></div><div class="skel-line w60"></div><div class="skel-line w100"></div></div>'.repeat(4);btn.style.display='none';
const gr=$('#geo-row');if(ulat){geoMsg(t('geoGranted'))}else{gr.style.display='flex';gr.innerHTML='<button class="geo-btn" onclick="window._ns.reqGeo()">'+t('findNearMe')+'</button>'}
window.scrollTo({top:sec.offsetTop-120,behavior:'smooth'})}else{btn.disabled=true;btn.textContent='...'}
renderFilters();
try{const data=await searchTrials(q,append?npt:null);tc=data.totalCount||0;npt=data.nextPageToken||null;const s=data.studies||[];
if(!append)studies=s;else studies=studies.concat(s);
if(ulat&&!append)s.sort((a,b)=>{const da=trialDist(a),db=trialDist(b);if(da===null&&db===null)return 0;if(da===null)return 1;if(db===null)return-1;return da-db});
$('#results-title').textContent=t('results');$('#results-count').textContent=tc.toLocaleString()+' '+t('totalFound');
if(!append)list.innerHTML='';
if(!s.length&&!append){list.innerHTML='<div class="no-results"><div class="nr-icon">\uD83D\uDD0D</div><p>'+t('noResults')+'</p><p style="margin-top:6px;font-size:.82rem">'+t('noResultsTip')+'</p></div>'}
else{list.innerHTML+=s.map(renderTrialCard).join('');s.forEach(st=>{const nct=st.protocolSection?.identificationModule?.nctId;const drug=st.protocolSection?.armsInterventionsModule?.interventions?.find(iv=>iv.type==='DRUG'||iv.type==='BIOLOGICAL');if(drug&&nct)loadFDA(nct,drug.name)})}
btn.style.display=npt?'block':'none';btn.disabled=false;btn.textContent=t('loadMore')}
catch(e){if(!append)list.innerHTML='';err.innerHTML='<div class="error-msg">'+t('errorMsg')+'</div>';btn.style.display='none'}
loading=false}

async function loadFDA(nct,dn){const res=await fetchFDA(dn);const el=document.getElementById('fda-inner-'+nct);if(!el)return;if(!res||!res.length){el.innerHTML='<span style="font-size:.78rem;color:var(--text2)">'+t('noDrugData')+'</span>';return}el.innerHTML='<span class="elig-label">'+t('topReactions')+'</span><div class="fda-reactions">'+res.map(r=>'<span class="fda-pill">'+r.term.toLowerCase()+' ('+r.count.toLocaleString()+')</span>').join('')+'</div><div class="fda-disclaimer">'+t('drugDisclaimer')+'</div>'}

function copyLink(url,btn){navigator.clipboard.writeText(url).then(()=>{btn.textContent=t('copied');btn.classList.add('copied');setTimeout(()=>{btn.textContent=t('copyLink');btn.classList.remove('copied')},2000)})}
function shareTrial(nct){const s=studies.find(x=>x.protocolSection?.identificationModule?.nctId===nct);if(!s)return;const ps=s.protocolSection||{},title=ps.identificationModule?.briefTitle||'Trial',status=ps.statusModule?.overallStatus||'',phases=(ps.designModule?.phases||[]).join(', ').replace(/PHASE/g,'Phase '),locs=(ps.contactsLocationsModule?.locations||[]).slice(0,5).map(l=>[l.city,l.state,l.country].filter(Boolean).join(', ')).join('; '),el=ps.eligibilityModule||{},ctURL='https://clinicaltrials.gov/study/'+nct,co=(ps.contactsLocationsModule?.centralContacts||[])[0]||{};
const w=window.open('','_blank','width=600,height=700');if(!w)return;
w.document.write('<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>'+esc(title)+'</title><style>body{font-family:-apple-system,sans-serif;padding:32px;max-width:560px;margin:0 auto;color:#1d1d1f;line-height:1.6}h1{font-size:1.1rem;margin-bottom:6px}.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:.72rem;font-weight:600;background:#eee;margin-right:4px}.section{margin:14px 0;padding:12px;border:1px solid #ddd;border-radius:8px}.section h3{font-size:.82rem;margin-bottom:6px;color:#666}.link{color:#0071E3;font-weight:600;word-break:break-all}button{padding:8px 16px;border:1px solid #0071E3;background:#0071E3;color:#fff;border-radius:8px;font-size:.85rem;cursor:pointer;font-family:inherit;margin:8px 4px 0 0}.footer{margin-top:20px;font-size:.72rem;color:#999;text-align:center;border-top:1px solid #eee;padding-top:12px}@media print{button{display:none}}</style></head><body><h1>'+esc(title)+'</h1><div><span class="badge">'+status+'</span>'+(phases?'<span class="badge">'+phases+'</span>':'')+'</div><div class="section"><h3>Locations</h3><p>'+(locs||'Not specified')+'</p></div><div class="section"><h3>Eligibility</h3><p>Age: '+(el.minimumAge||'?')+' - '+(el.maximumAge||'?')+' | Sex: '+(el.sex||'?')+'</p></div>'+(co.name?'<div class="section"><h3>Contact</h3><p>'+esc(co.name)+(co.phone?' | '+co.phone:'')+(co.email?' | '+co.email:'')+'</p></div>':'')+'<p style="margin-top:14px"><a class="link" href="'+ctURL+'" target="_blank">'+ctURL+'</a></p><button onclick="navigator.clipboard.writeText(\''+ctURL+'\');this.textContent=\'Copied!\'">Copy Link</button><button onclick="window.print()">Print</button><div class="footer">Generado por Nuestra Salud | sbc1-code.github.io/ensayos-clinicos</div></body></html>');w.document.close()}
function togExp(id){const el=document.getElementById(id);if(el)el.classList.toggle('open')}
async function togFDA(nct,dn){const el=document.getElementById('fda-'+nct);if(!el)return;if(el.classList.contains('open')){el.classList.remove('open');return}el.classList.add('open');await loadFDA(nct,dn)}
function dispOpen(i){switchTab('conditions');setTimeout(()=>openCondition(i),100)}

function toggleLang(nl){lang=nl;document.documentElement.lang=lang;$$('#lang-toggle button').forEach(b=>b.classList.toggle('active',b.dataset.lang===lang));mlC.clear();updateUI();setURL()}
function toggleDark(){dark=!dark;document.documentElement.classList.toggle('dark',dark);$('#theme-toggle').textContent=dark?'\u2600\uFE0F':'\u263D'}

function init(){
readURL();if(dark){document.documentElement.classList.add('dark');$('#theme-toggle').textContent='\u2600\uFE0F'}
$$('#lang-toggle button').forEach(b=>b.classList.toggle('active',b.dataset.lang===lang));
updateUI();
C.forEach(async c=>{counts[c.id]=await countTrials(c)});
$$('#lang-toggle button').forEach(b=>b.addEventListener('click',()=>toggleLang(b.dataset.lang)));
$('#theme-toggle').addEventListener('click',toggleDark);
$('#cond-search').addEventListener('input',e=>{const v=e.target.value.toLowerCase();$$('.condition-card').forEach(c=>{const i=parseInt(c.dataset.i);const m=C[i];const show=!v||m.nEs.toLowerCase().includes(v)||m.nEn.toLowerCase().includes(v)||m.q.toLowerCase().includes(v);c.style.display=show?'':'none'})});
const ts=$('#trial-search');ts.addEventListener('input',e=>{clearTimeout(sto);sto=setTimeout(()=>onTrialSearch(e.target.value),300)});
ts.addEventListener('keydown',e=>{if(e.key==='Enter'){clearTimeout(sto);onTrialSearch(e.target.value)}});
$('#load-more').addEventListener('click',()=>{const q=selCond!==null?C[selCond].q:sq;if(q&&npt)loadTrialResults(q,true)});
if(sq){ts.value=sq;if(tab==='trials')loadTrialResults(sq)}
if(viewCond!==null)openCondition(viewCond);
if(tab!=='conditions')switchTab(tab)}

window._ns={reqGeo,copyLink,shareTrial,togExp,togFDA,backToGrid,dispOpen,loadDetailMore};
init();
})();
